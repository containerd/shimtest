name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-runc-shim:
    name: Test containerd runc shim (${{ matrix.containerd }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        containerd:
          - v2.3.0-beta.2
          - main

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libseccomp-dev

      - name: Build containerd shim
        # The shimtest harness does not require a containerd daemon;
        # only the shim binary is needed.
        run: |
          git clone --depth=1 --branch "${{ matrix.containerd }}" \
            https://github.com/containerd/containerd.git /tmp/containerd
          cd /tmp/containerd
          make bin/containerd-shim-runc-v2
          sudo install -m 0755 bin/containerd-shim-runc-v2 /usr/local/bin/
          which containerd-shim-runc-v2

      - name: Install runc
        # Use the runc version pinned by the containerd revision under test.
        run: |
          runc_version=$(cat /tmp/containerd/script/setup/runc-version)
          echo "runc version: ${runc_version}"
          git clone --depth=1 --branch "${runc_version}" \
            https://github.com/opencontainers/runc.git /tmp/runc
          cd /tmp/runc
          make BUILDTAGS='seccomp'
          sudo make install
          runc --version

      - name: Build shimtest
        run: make build

      - name: Allow unprivileged user namespaces
        # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor
        # by default, which breaks rootless runc.
        # https://discourse.ubuntu.com/t/ubuntu-24-04-lts-noble-numbat-release-notes/39890#unprivileged-user-namespace-restrictions-15
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Prepare rootless profile
        # runc-rootless.json pins uid: 1000, but the GitHub Actions
        # runner user may have a different uid. Rewrite the profile to
        # match the current user.
        run: |
          uid=$(id -u)
          gid=$(id -g)
          echo "Current user: uid=${uid} gid=${gid}"
          jq --argjson uid "${uid}" --argjson gid "${gid}" \
            '.uid = $uid | .gid = $gid' \
            .github/workflows/profiles/runc-rootless.json > .github/workflows/profiles/runc-rootless.json.new
          mv .github/workflows/profiles/runc-rootless.json.new .github/workflows/profiles/runc-rootless.json
          cat .github/workflows/profiles/runc-rootless.json

      - name: Run tests (rootless)
        run: |
          _output/shimtest.test -test.v -test.timeout=120s \
            -shimtest.config=.github/workflows/profiles/runc-rootless.json

      - name: Run tests (root)
        run: |
          sudo _output/shimtest.test -test.v -test.timeout=120s \
            -shimtest.config=.github/workflows/profiles/runc.json

  test-nerdbox-shim:
    name: Test nerdbox shim
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout shimtest
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout nerdbox
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: containerd/nerdbox
          ref: main
          path: nerdbox

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -aG kvm $USER

      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Read kernel version from nerdbox
        id: kernel-version
        working-directory: nerdbox
        run: |
          version=$(grep -E '^kernel [0-9.]+$' .github/.tool-versions | sed -E 's/^kernel ([0-9.]+)$/\1/')
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Calculate kernel cache key
        # Content-addressed key matching nerdbox's own CI so the cached
        # artifact is valid for any nerdbox main revision that shares
        # the same kernel config + patches.
        id: cache-key
        working-directory: nerdbox
        run: |
          arch=x86_64
          config_file="kernel/config-${{ steps.kernel-version.outputs.version }}-${arch}"
          config_hash=$(sha256sum "$config_file" | cut -d' ' -f1)
          patches_hash=$(find kernel/patches -type f -name "*.patch" -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1)
          key="kernel-${{ steps.kernel-version.outputs.version }}-${arch}-${config_hash:0:8}-${patches_hash:0:8}"
          echo "key=${key}" >> $GITHUB_OUTPUT
          echo "Kernel cache key: ${key}"

      - name: Restore kernel cache
        id: cache-kernel
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: nerdbox/_output/nerdbox-kernel-x86_64
          key: ${{ steps.cache-key.outputs.key }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build kernel (cache miss)
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        working-directory: nerdbox
        run: |
          docker buildx bake kernel \
            --set kernel.args.KERNEL_VERSION=${{ steps.kernel-version.outputs.version }} \
            --set kernel.args.KERNEL_ARCH=x86_64 \
            --set kernel.args.KERNEL_NPROC=4

      - name: Save kernel cache
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: nerdbox/_output/nerdbox-kernel-x86_64
          key: ${{ steps.cache-key.outputs.key }}

      - name: Build nerdbox host and guest binaries
        working-directory: nerdbox
        run: docker buildx bake host-binaries guest-binaries

      - name: Verify nerdbox artifacts
        run: |
          ls -lh nerdbox/_output/
          file nerdbox/_output/nerdbox-kernel-x86_64 \
               nerdbox/_output/nerdbox-initrd \
               nerdbox/_output/containerd-shim-nerdbox-v1

      - name: Add nerdbox _output to PATH
        run: echo "$(pwd)/nerdbox/_output" >> $GITHUB_PATH

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: nerdbox/.github/.tool-versions

      - name: Build shimtest
        run: make build

      - name: Run tests
        run: |
          _output/shimtest.test -test.v -test.timeout=300s \
            -shimtest.config=.github/workflows/profiles/nerdbox.json
