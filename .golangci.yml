version: "2"
linters:
  enable:
    - copyloopvar  # Checks for loop variable copies in Go 1.22+
    - dupword      # Checks for duplicate words in the source code
    - misspell
    - nolintlint
    - revive
    - unconvert
  disable:
    - errcheck
    - unused
  settings:
    revive:
      rules:
        - name: package-comments
          severity: warning
          disabled: true
          exclude: [""]
    nolintlint:
      allow-unused: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - revive
        text: if-return
      - linters:
          - revive
        text: empty-block
      - linters:
          - revive
        text: superfluous-else
      - linters:
          - revive
        text: unused-parameter
      - linters:
          - revive
        text: unreachable-code
      - linters:
          - revive
        text: redefines-builtin-id
      - linters:
          - staticcheck
        text: "SA4010"  # append result unused in intentional infinite memory-hog loop
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: strict
